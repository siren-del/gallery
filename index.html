<!DOCTYPE html>
<html>
<head>
  <title>My Gallery</title>
  <style>
    body{
      font-family: Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    .gallery{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      justify-content:center;
      padding:20px;
    }

    .gallery img{
      width:300px;
      height:200px;
      object-fit:cover;
      border-radius:10px;
      transition:0.3s;
    }

    .gallery img:hover{
      transform:scale(1.05);
    }
  </style>
</head>
<body>

<h1>My Image Gallery</h1>

<div class="gallery">
  <img src="1.jpg">
  <img src="2.jpg">
  <img src="3.jpg">
</div>

</body>
</html>
